
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Select Your Role</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <h1>Welcome Back</h1>
            <p>Please select your account type to proceed to your dashboard.</p>
        </header>

        <div class="roles-grid">
            <!-- Tenant Card -->
            <button class="role-card" id="tenant-card">
                <div class="icon-wrapper tenant-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
                <h2>Tenant</h2>
                <p>Access your rental details, pay rent, and submit maintenance requests.</p>
                <div class="arrow">→</div>
            </button>

            <!-- Owner Card -->
            <button class="role-card" id="owner-card">
                <div class="icon-wrapper owner-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="2" x2="12" y2="22"></line>
                        <line x1="17" y1="5" x2="17" y2="22"></line>
                        <line x1="7" y1="5" x2="7" y2="22"></line>
                        <path d="M22 22H2"></path>
                        <circle cx="12" cy="14" r="1.5"></circle>
                        <circle cx="17" cy="14" r="1.5"></circle>
                        <circle cx="7" cy="14" r="1.5"></circle>
                    </svg>
                </div>
                <h2>Owner</h2>
                <p>Manage your properties, view financial reports, and oversee leases.</p>
                <div class="arrow">→</div>
            </button>

            <!-- Admin Card -->
            <button class="role-card" id="admin-card">
                <div class="icon-wrapper admin-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M12 8v4"></path>
                        <path d="M12 16h.01"></path>
                    </svg>
                </div>
                <h2>Admin</h2>
                <p>System configuration, user management, and platform analytics.</p>
                <div class="arrow">→</div>
            </button>
        </div>

        <div id="action-container" class="action-container hidden">
            <button id="get-started-btn" class="btn-primary">Get Started</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
