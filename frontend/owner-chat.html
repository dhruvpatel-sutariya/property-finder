<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Finder</title>
    <link rel="stylesheet" href="tenant-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            height: calc(100vh - 120px);
            display: flex;
            gap: 0;
            background-color: var(--surface-light);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-sidebar {
            width: 320px;
            background-color: var(--surface-color);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .chat-sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-sidebar-header h2 {
            font-size: 1.5rem;
            color: var(--text-light);
            margin: 0;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            gap: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .contact-item:hover,
        .contact-item.active {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .contact-item.active {
            border-left: 4px solid var(--primary-color);
            padding-left: calc(1.5rem - 4px);
        }

        .contact-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .contact-info {
            flex: 1;
            overflow: hidden;
        }

        .contact-name {
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--surface-light);
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: var(--surface-color);
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            display: flex;
            flex-direction: column;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-light);
        }

        .chat-header-status {
            font-size: 0.8rem;
            color: #2ecc71;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .chat-header-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.received {
            align-self: flex-start;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
        }

        .message.received .message-bubble {
            background-color: var(--surface-color);
            color: var(--text-light);
            border-bottom-left-radius: 4px;
        }

        .message.sent .message-bubble {
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
            align-self: flex-end;
        }

        .message.received .message-time {
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 1.5rem;
            background-color: var(--surface-color);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: var(--surface-light);
            color: var(--text-light);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-send {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-send:hover {
            background-color: var(--primary-hover);
        }

        .btn-send:active {
            transform: scale(0.95);
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-chat svg {
            color: rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
            width: 80px;
            height: 80px;
        }

        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                margin: 0;
                height: calc(100vh - 70px);
                border-radius: 0;
            }

            .chat-sidebar {
                width: 100%;
                height: 30%;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .chat-main {
                height: 70%;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="brand-icon">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <h2>Property Finder</h2>
        </a>
        <div class="nav-links">
            <a href="owner-dashboard.html" class="nav-link">Properties</a>
            <a href="owner-chat.html" class="nav-link active">Messages</a>
            <a href="#" class="nav-link">Feedback and Review</a>
        </div>
        <div class="nav-auth">
            <a href="owner-profile.html" aria-label="Owner Profile">
                <div class="user-avatar"
                    style="width: 35px; height: 35px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 2px solid var(--primary-color);">
                    <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
                        alt="Owner" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="chat-container">
        <!-- Sidebar -->
        <aside class="chat-sidebar">
            <div class="chat-sidebar-header">
                <h2>Tenant Inquiries</h2>
            </div>
            <ul class="contact-list" id="contact-list">
                <!-- Contacts will be injected here -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main" id="chat-main">
            <div class="empty-chat" id="empty-chat-state">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3>Your Messages</h3>
                <p>Select a tenant inquiry to start chatting.</p>
            </div>

            <div id="active-chat-content" class="hidden" style="display: none; flex-direction: column; height: 100%;">
                <header class="chat-header">
                    <div style="display: flex; align-items: center; gap: 1rem; flex: 1;">
                        <img src="" alt="Contact Avatar" class="chat-header-avatar" id="active-chat-avatar">
                        <div class="chat-header-info">
                            <span class="chat-header-name" id="active-chat-name">Tenant Name</span>
                            <span class="chat-header-status">Online</span>
                        </div>
                    </div>
                    <button id="req-feedback-btn" style="padding: 0.5rem 1rem; background-color: var(--primary-color); border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.3rem;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        Request Feedback
                    </button>
                </header>

                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be injected here -->
                </div>

                <form class="chat-input-area" id="chat-form">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Type your reply here..." required
                        autocomplete="off">
                    <button type="submit" class="btn-send">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Request Feedback Modal -->
    <div id="feedback-modal" class="hidden" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--surface-color); padding: 2rem; border-radius: 12px; width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); position: relative;">
            <button onclick="document.getElementById('feedback-modal').style.display='none'"
                style="position: absolute; top: 1rem; right: 1.5rem; background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h3 style="margin-top: 0; margin-bottom: 1.5rem; color: var(--text-light); font-size: 1.25rem;">Select Property for Feedback</h3>
            <div id="feedback-property-list" style="display: flex; flex-direction: column; gap: 1rem; max-height: 350px; overflow-y: auto;">
                <!-- properties generated here -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ownerName = localStorage.getItem('ownerName');
            if (!ownerName) {
                window.location.href = 'owner-auth.html';
                return;
            }

            const activeOwnerId = ownerName.replace(/\s+/g, '-').toLowerCase();

            // Load Tenant Details
            let tenantName = 'Tenant User';
            let tenantAvatar = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80';
            const profileDataStr = localStorage.getItem('tenantProfile');
            if (profileDataStr) {
                try {
                    const profileData = JSON.parse(profileDataStr);
                    if (profileData.name) tenantName = profileData.name;
                    if (profileData.avatar) tenantAvatar = profileData.avatar;
                } catch (e) { }
            }

            // Load global chats and filter out chats for this specific owner
            let globalChats = JSON.parse(localStorage.getItem('tenantChats') || '[]');

            // For this owner, the 'chat.id' should match activeOwnerId
            let ownerChat = globalChats.find(c => c.id === activeOwnerId);

            const contactList = document.getElementById('contact-list');
            const activeChatContent = document.getElementById('active-chat-content');
            const emptyChatState = document.getElementById('empty-chat-state');
            const chatMessagesContainer = document.getElementById('chat-messages');

            function renderContacts() {
                contactList.innerHTML = '';
                if (!ownerChat) return;

                const li = document.createElement('li');
                li.className = 'contact-item active';

                const lastMsg = ownerChat.messages.length > 0 ? ownerChat.messages[ownerChat.messages.length - 1].text : 'No messages yet';

                li.innerHTML = `
                    <img src="${tenantAvatar}" alt="${tenantName}" class="contact-avatar">
                    <div class="contact-info">
                        <div class="contact-name">${tenantName}</div>
                        <div class="contact-preview">${lastMsg}</div>
                    </div>
                `;
                li.addEventListener('click', () => openChat());
                contactList.appendChild(li);
            }

            function openChat() {
                if (!ownerChat) return;

                emptyChatState.style.display = 'none';
                activeChatContent.style.display = 'flex';
                activeChatContent.classList.remove('hidden');

                document.getElementById('active-chat-name').textContent = tenantName;
                document.getElementById('active-chat-avatar').src = tenantAvatar;
                document.getElementById('req-feedback-btn').style.display = 'inline-block';

                renderMessages(ownerChat);
            }

            function renderMessages(chat) {
                chatMessagesContainer.innerHTML = '';
                chat.messages.forEach(msg => {
                    const div = document.createElement('div');
                    // Reverse the sender logic because the perspective is swapped for Owner
                    // user -> received, owner -> sent
                    div.className = `message ${msg.sender === 'owner' ? 'sent' : 'received'}`;
                    
                    if (msg.type === 'feedback_request') {
                        div.innerHTML = `
                            <div class="message-bubble" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
                                <strong>Feedback Request Sent</strong><br>
                                <span style="font-size: 0.85rem; color: var(--text-muted);">${msg.propertyData.title}</span>
                            </div>
                            <div class="message-time">${msg.time}</div>
                        `;
                    } else if (msg.type === 'feedback_response') {
                        let starsHtml = '';
                        for(let i = 1; i <= 5; i++) {
                            starsHtml += `<svg width="14" height="14" viewBox="0 0 24 24" fill="${i <= msg.ratingData.stars ? '#f1c40f' : 'none'}" stroke="${i <= msg.ratingData.stars ? '#f1c40f' : 'currentColor'}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
                        }
                        div.innerHTML = `
                            <div class="message-bubble" style="background: rgba(46, 204, 113, 0.15); border: 1px solid rgba(46, 204, 113, 0.3);">
                                <strong>Feedback Received!</strong><br>
                                <div style="margin: 0.3rem 0;">${starsHtml}</div>
                                <span style="font-size: 0.9rem; font-style: italic;">"${msg.ratingData.comments}"</span>
                            </div>
                            <div class="message-time">${msg.time}</div>
                        `;
                    } else {
                        div.innerHTML = `
                            <div class="message-bubble">${msg.text}</div>
                            <div class="message-time">${msg.time}</div>
                        `;
                    }
                    chatMessagesContainer.appendChild(div);
                });
                chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
            }

            document.getElementById('chat-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('chat-input');
                const text = input.value.trim();

                if (text && ownerChat) {
                    const chatIndex = globalChats.findIndex(c => c.id === activeOwnerId);
                    if (chatIndex !== -1) {
                        // Insert Owners reply
                        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        globalChats[chatIndex].messages.push({ text, sender: "owner", time });

                        input.value = '';
                        localStorage.setItem('tenantChats', JSON.stringify(globalChats));

                        // Re-fetch from context
                        ownerChat = globalChats[chatIndex];
                        renderMessages(ownerChat);
                        renderContacts();
                    }
                }
            });

            renderContacts();
            
            // Handle Feedback Request Modal
            document.getElementById('req-feedback-btn').addEventListener('click', () => {
                const ownerProps = JSON.parse(localStorage.getItem('ownerProperties') || '[]');
                
                // Show properties. We can just show all of them for now
                const propList = document.getElementById('feedback-property-list');
                propList.innerHTML = '';
                
                if(ownerProps.length === 0) {
                    propList.innerHTML = '<p style="color:var(--text-muted); text-align:center;">You have no properties listed.</p>';
                } else {
                    ownerProps.forEach(prop => {
                        const img = prop.images && prop.images[0] ? prop.images[0] : 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80';
                        const div = document.createElement('div');
                        div.style.cssText = 'display: flex; gap: 1rem; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; align-items: center; background: rgba(0,0,0,0.2); cursor: pointer; transition: background 0.2s;';
                        div.innerHTML = `
                            <img src="${img}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 6px;">
                            <div style="flex:1;">
                                <h4 style="margin: 0 0 0.25rem 0;">${prop.title}</h4>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">${prop.location}</span>
                            </div>
                            <button style="padding: 0.4rem 0.8rem; background: var(--primary-color); border: none; border-radius: 4px; color: white; font-size: 0.8rem; cursor: pointer;">Send</button>
                        `;
                        div.addEventListener('click', () => {
                            sendFeedbackRequest(prop);
                            document.getElementById('feedback-modal').style.display = 'none';
                        });
                        propList.appendChild(div);
                    });
                }
                
                document.getElementById('feedback-modal').style.display = 'flex';
            });
            
            function sendFeedbackRequest(prop) {
                if (!ownerChat) return;
                const chatIndex = globalChats.findIndex(c => c.id === activeOwnerId);
                if (chatIndex !== -1) {
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const img = prop.images && prop.images[0] ? prop.images[0] : 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80';
                    
                    globalChats[chatIndex].messages.push({
                        text: `Please leave your feedback for the property.`,
                        sender: "owner",
                        time,
                        type: 'feedback_request',
                        propertyData: { id: prop.id, title: prop.title, image: img }
                    });

                    localStorage.setItem('tenantChats', JSON.stringify(globalChats));

                    // Re-fetch and re-render
                    ownerChat = globalChats[chatIndex];
                    renderMessages(ownerChat);
                    renderContacts();
                }
            }
        });
    </script>
</body>

</html>
