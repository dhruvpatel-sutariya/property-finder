<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Finder</title>
    <link rel="stylesheet" href="tenant-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 2rem;
        }

        .dashboard-sidebar {
            background-color: var(--surface-light);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            height: fit-content;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            margin-bottom: 1rem;
        }

        .profile-name {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .profile-role {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            margin-top: 2rem;
        }

        .sidebar-link {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background-color: var(--primary-color);
            color: white;
        }

        .dashboard-main {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background-color: var(--surface-light);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tenant-card {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
        }

        .tenant-avatar {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }

        .tenant-info h4 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        .tenant-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 1rem;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .tenant-details div {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .tenant-details span.label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .tenant-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="brand-icon">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <h2>Property Finder</h2>
        </a>
        <div class="nav-links">
            <a href="owner-dashboard.html" class="nav-link">Properties</a>
            <a href="owner-chat.html" class="nav-link">Messages</a>
            <a href="#" class="nav-link">Feedback and Review</a>
        </div>
        <div class="nav-auth">
            <div class="user-avatar"
                style="width: 35px; height: 35px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 2px solid var(--primary-color);">
                <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
                    alt="Owner" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
                alt="Owner Avatar" class="profile-avatar">
            <h2 class="profile-name" id="display-name">Loading...</h2>
            <div class="profile-role">Property Owner</div>
            <div class="sidebar-links">
                <a href="owner-dashboard.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg> Dashboard
                </a>
                <a href="owner-profile.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg> Add Property
                </a>
                <a href="owner-tenants.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg> Bookings
                </a>
                <a href="owner-my-tenants.html" class="sidebar-link active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg> My Tenants
                </a>
                <a href="index.html" class="sidebar-link" style="color: #e74c3c; margin-top: 1rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg> Log Out
                </a>
            </div>
        </aside>

        <!-- Main Content (Tenants) -->
        <main class="dashboard-main">
            <div class="card">
                <div class="card-header">
                    <h3 style="margin: 0; font-size: 1.5rem;">My Tenants</h3>
                </div>
                <div id="tenants-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- View Property Modal -->
    <div id="view-property-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div
            style="background: var(--surface-color); padding: 2rem; border-radius: 12px; width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); position: relative;">
            <button onclick="document.getElementById('view-property-modal').style.display='none'"
                style="position: absolute; top: 1rem; right: 1.5rem; background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h3 style="margin-top: 0; margin-bottom: 1rem; font-size: 1.25rem;">Property Details</h3>
            <img id="view-prop-img" src="" alt="Property"
                style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem;">
            <h4 id="view-prop-title" style="margin: 0 0 0.5rem 0; font-size: 1.2rem; color: var(--primary-color);"></h4>
            <p id="view-prop-loc" style="margin: 0 0 1rem 0; color: var(--text-muted); font-size: 0.95rem;"></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ownerName = localStorage.getItem('ownerName') || 'Vikas Patel';
            document.getElementById('display-name').innerText = ownerName;

            const list = document.getElementById('tenants-list');
            const myTenants = JSON.parse(localStorage.getItem('approvedTenants') || '[]');

            if (myTenants.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 3rem 0; color: var(--text-muted);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.5; margin-bottom: 1rem;">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <h3 style="margin-bottom: 0.5rem; color: var(--text-light);">No active tenants yet</h3>
                        <p>Approve booking requests to see your tenants here.</p>
                    </div>
                `;
            } else {
                myTenants.forEach((b, index) => {
                    const t = b.tenantProfile || {};
                    const avatarStr = t.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80';
                    const nameStr = t.name || t.email || 'Tenant User';

                    const div = document.createElement('div');
                    div.className = 'tenant-card';
                    div.innerHTML = `
                        <img src="\${avatarStr}" alt="Tenant" class="tenant-avatar">
                        <div class="tenant-info" style="flex: 1;">
                            <h4>\${nameStr}</h4>
                            <div style="margin-bottom: 0.5rem;"><span style="background: rgba(46, 204, 113, 0.2); color: #2ecc71; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500;">Approved / Sold</span></div>
                            <p style="margin: 0; color: var(--text-muted); font-size: 0.95rem;">Property: <strong style="color: var(--text-light);">\${b.propertyTitle}</strong></p>
                            
                            <div class="tenant-details">
                                <div><span class="label">Email</span> <span>\${t.email || '-'}</span></div>
                                <div><span class="label">Phone</span> <span>\${t.phone || '-'}</span></div>
                                <div><span class="label">Occupation</span> <span>\${t.occupation || '-'}</span></div>
                                <div><span class="label">Move-in timeframe</span> <span>Within 30 Days</span></div>
                            </div>
                            
                            <div style="margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                                <a href="owner-chat.html" style="padding: 0.6rem 1.2rem; background: var(--primary-color); border: none; color: white; text-decoration: none; border-radius: 6px; text-align: center;">Message Tenant</a>
                                <button onclick="viewBookedProperty(\${index})" style="padding: 0.6rem 1.2rem; background: transparent; border: 1px solid rgba(52, 152, 219, 0.4); color: #3498db; border-radius: 6px; cursor: pointer;">View Property</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            }

            // Expose a global function to view property
            window.viewBookedProperty = function (index) {
                const b = myTenants[index];
                if (b) {
                    document.getElementById('view-prop-title').textContent = b.propertyTitle || 'Property Info Unavailable';
                    document.getElementById('view-prop-loc').textContent = b.propertyLoc || '';
                    document.getElementById('view-prop-img').src = b.propertyImage || 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80';
                    document.getElementById('view-property-modal').style.display = 'flex';
                }
            };
        });
    </script>
</body>

</html>
