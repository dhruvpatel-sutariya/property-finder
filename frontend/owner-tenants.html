<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Finder</title>
    <link rel="stylesheet" href="tenant-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 2rem;
        }

        .dashboard-sidebar {
            background-color: var(--surface-light);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            height: fit-content;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            margin-bottom: 1rem;
        }

        .profile-name {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .profile-role {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            margin-top: 2rem;
        }

        .sidebar-link {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background-color: var(--primary-color);
            color: white;
        }

        .dashboard-main {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background-color: var(--surface-light);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tenant-card {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
        }

        .tenant-avatar {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }

        .tenant-info h4 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        .tenant-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 1rem;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .tenant-details div {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .tenant-details span.label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .tenant-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand" style="text-decoration: none; color: inherit;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="brand-icon">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <h2>Property Finder</h2>
        </a>
        <div class="nav-links">
            <a href="owner-dashboard.html" class="nav-link">Properties</a>
            <a href="owner-chat.html" class="nav-link">Messages</a>
            <a href="#" class="nav-link">Feedback and Review</a>
        </div>
        <div class="nav-auth">
            <div class="user-avatar"
                style="width: 35px; height: 35px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 2px solid var(--primary-color);">
                <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
                    alt="Owner" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
                alt="Owner Avatar" class="profile-avatar">
            <h2 class="profile-name" id="display-name">Loading...</h2>
            <div class="profile-role">Property Owner</div>
            <div class="sidebar-links">
                <a href="owner-dashboard.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg> Dashboard
                </a>
                <a href="owner-profile.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg> Add Property
                </a>
                <a href="owner-tenants.html" class="sidebar-link active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg> Bookings
                </a>
                <a href="owner-my-tenants.html" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg> My Tenants
                </a>
                <a href="index.html" class="sidebar-link" style="color: #e74c3c; margin-top: 1rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg> Log Out
                </a>
            </div>
        </aside>

        <!-- Main Content (Tenants) -->
        <main class="dashboard-main">
            <div class="card">
                <div class="card-header">
                    <h3 style="margin: 0; font-size: 1.5rem;">Bookings</h3>
                </div>
                <div id="tenants-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- View Property Modal -->
    <div id="view-property-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div
            style="background: var(--surface-color); padding: 2rem; border-radius: 12px; width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); position: relative;">
            <button onclick="document.getElementById('view-property-modal').style.display='none'"
                style="position: absolute; top: 1rem; right: 1.5rem; background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h3 style="margin-top: 0; margin-bottom: 1rem; font-size: 1.25rem;">Property Details</h3>
            <img id="view-prop-img" src="" alt="Property"
                style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem;">
            <h4 id="view-prop-title" style="margin: 0 0 0.5rem 0; font-size: 1.2rem; color: var(--primary-color);"></h4>
            <p id="view-prop-loc" style="margin: 0 0 1rem 0; color: var(--text-muted); font-size: 0.95rem;"></p>
        </div>
    </div>

    <!-- View ID Proof Modal -->
    <div id="view-idproof-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1010; align-items: center; justify-content: center;">
        <div
            style="background: var(--surface-color); padding: 2rem; border-radius: 12px; width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); position: relative; text-align: center;">
            <button onclick="document.getElementById('view-idproof-modal').style.display='none'"
                style="position: absolute; top: 1rem; right: 1.5rem; background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h3 style="margin-top: 0; margin-bottom: 1.5rem; font-size: 1.15rem; color: var(--text-light);">Tenant ID Proof Document</h3>
            <img id="view-idproof-img" src="" alt="ID Proof"
                style="width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; border: 1px dashed rgba(255,255,255,0.2);">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ownerName = localStorage.getItem('ownerName') || 'Vikas Patel';
            document.getElementById('display-name').innerText = ownerName;

            const list = document.getElementById('tenants-list');
            const bookings = JSON.parse(localStorage.getItem('ownerBookings') || '[]');

            // Filter bookings for this exact owner, fallback to all if name unverified but we'll try strict
            const myBookings = bookings;

            if (myBookings.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 3rem 0; color: var(--text-muted);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.5; margin-bottom: 1rem;">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <h3 style="margin-bottom: 0.5rem; color: var(--text-light);">No tenants yet</h3>
                        <p>When someone books your property, their details will appear here.</p>
                    </div>
                `;
            } else {
                myBookings.forEach((b, index) => {
                    if (b.status && b.status !== 'Pending Owner') return;
                    const t = b.tenantProfile || {};
                    const avatarStr = t.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80';
                    const nameStr = t.name || t.email || 'Tenant User';

                    const div = document.createElement('div');
                    div.className = 'tenant-card';
                    div.innerHTML = `
                        <div style="display: flex; flex-direction: column; gap: 1rem; flex: 1;">
                            <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                                <!-- Tenant Info -->
                                <div style="flex: 1; min-width: 250px;">
                                    <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                                        <img src="${avatarStr}" alt="Tenant" class="tenant-avatar" style="width: 60px; height: 60px; border-radius: 50%;">
                                        <div>
                                            <h4 style="margin: 0; font-size: 1.2rem;">${nameStr}</h4>
                                            <span style="background: rgba(46, 204, 113, 0.2); color: #2ecc71; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500;">Booking Request</span>
                                        </div>
                                    </div>
                                    <div class="tenant-details" style="margin-top: 0;">
                                        <div><span class="label">Email</span> <span>${t.email || '-'}</span></div>
                                        <div><span class="label">Phone</span> <span>${t.phone || '-'}</span></div>
                                        <div><span class="label">Occupation</span> <span>${t.occupation || '-'}</span></div>
                                        <div><span class="label">Timeframe</span> <span>Immediate</span></div>
                                    </div>
                                    <button onclick="viewTenantIdProof('${t.idProof || 'https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80'}')" style="margin-top: 1rem; padding: 0.4rem 0.8rem; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-light); border-radius: 4px; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; transition: background 0.2s;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                        View ID Proof
                                    </button>
                                </div>
                                
                                <!-- Property Info -->
                                <div style="flex: 1; min-width: 250px; background: rgba(0,0,0,0.15); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                                    <span style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">Interested In Property</span>
                                    <div style="display: flex; gap: 1rem;">
                                        <img src="${b.propertyImage || 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80'}" alt="Property" style="width: 80px; height: 80px; object-fit: cover; border-radius: 6px;">
                                        <div>
                                            <h5 style="margin: 0 0 0.4rem 0; font-size: 1.05rem; color: var(--text-light);">${b.propertyTitle || 'Property Info'}</h5>
                                            <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);">${b.propertyLoc || 'Location not specified'}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Action Buttons -->
                            <div style="margin-top: 0.5rem; display: flex; gap: 1rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem;">
                                <button onclick="approveBooking(${index})" style="flex: 1; padding: 0.8rem; background: #2ecc71; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: background 0.2s;">Confirm Booking</button>
                                <button onclick="rejectBooking(${index})" style="flex: 1; padding: 0.8rem; background: transparent; border: 1px solid #e74c3c; color: #e74c3c; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.2s;">Reject Booking</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            }

            // Expose a global function to view property
            window.viewBookedProperty = function (index) {
                const b = myBookings[index];
                if (b) {
                    document.getElementById('view-prop-title').textContent = b.propertyTitle || 'Property Info Unavailable';
                    document.getElementById('view-prop-loc').textContent = b.propertyLoc || '';
                    document.getElementById('view-prop-img').src = b.propertyImage || 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80';
                    document.getElementById('view-property-modal').style.display = 'flex';
                }
            };

            // Expose a global function to view Tenant ID Proof
            window.viewTenantIdProof = function (imgUrl) {
                document.getElementById('view-idproof-img').src = imgUrl;
                document.getElementById('view-idproof-modal').style.display = 'flex';
            };

            // Global function to approve a booking
            window.approveBooking = function (index) {
                const b = myBookings[index];
                if (b) {
                    b.status = 'Pending Admin';
                    localStorage.setItem('ownerBookings', JSON.stringify(myBookings));

                    alert('Booking Confirmed! It has been forwarded to the Admin for final approval.');
                    window.location.reload();
                }
            };
            window.rejectBooking = function (index) {
                if (confirm('Are you sure you want to reject this booking?')) {
                    const b = myBookings[index];
                    if (b) {
                        // Remove from pending bookings
                        myBookings.splice(index, 1);
                        localStorage.setItem('ownerBookings', JSON.stringify(myBookings));

                        // Push notification to tenant
                        let tenantNotifs = JSON.parse(localStorage.getItem('tenantNotifications') || '[]');
                        tenantNotifs.push({
                            id: Date.now(),
                            title: "Booking Rejected",
                            body: `The property owner has declined your booking for ${b.propertyTitle}.`,
                            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                            read: false
                        });
                        localStorage.setItem('tenantNotifications', JSON.stringify(tenantNotifs));

                        alert('Booking Rejected successfully.');
                        window.location.reload();
                    }
                }
            };
        });
    </script>
</body>

</html>
