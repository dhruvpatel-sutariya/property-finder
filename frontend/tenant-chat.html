<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Finder</title>
    <link rel="stylesheet" href="tenant-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            height: calc(100vh - 120px);
            display: flex;
            gap: 0;
            background-color: var(--surface-light);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-sidebar {
            width: 320px;
            background-color: var(--surface-color);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .chat-sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-sidebar-header h2 {
            font-size: 1.5rem;
            color: var(--text-light);
            margin: 0;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            gap: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .contact-item:hover,
        .contact-item.active {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .contact-item.active {
            border-left: 4px solid var(--primary-color);
            padding-left: calc(1.5rem - 4px);
        }

        .contact-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .contact-info {
            flex: 1;
            overflow: hidden;
        }

        .contact-name {
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--surface-light);
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: var(--surface-color);
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            display: flex;
            flex-direction: column;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-light);
        }

        .chat-header-status {
            font-size: 0.8rem;
            color: #2ecc71;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .chat-header-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.received {
            align-self: flex-start;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
        }

        .message.received .message-bubble {
            background-color: var(--surface-color);
            color: var(--text-light);
            border-bottom-left-radius: 4px;
        }

        .message.sent .message-bubble {
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
            align-self: flex-end;
        }

        .message.received .message-time {
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 1.5rem;
            background-color: var(--surface-color);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: var(--surface-light);
            color: var(--text-light);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-send {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-send:hover {
            background-color: var(--primary-hover);
        }

        .btn-send:active {
            transform: scale(0.95);
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-chat svg {
            color: rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
            width: 80px;
            height: 80px;
        }

        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                margin: 0;
                height: calc(100vh - 70px);
                border-radius: 0;
            }

            .chat-sidebar {
                width: 100%;
                height: 30%;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .chat-main {
                height: 70%;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="brand-icon">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <a href="index.html" style="text-decoration:none; color:inherit;"><h2>Property Finder</h2></a>
        </div>
        <div class="nav-links">
            <a href="tenant-home.html" class="nav-link">Home</a>
            <a href="tenant-chat.html" class="nav-link active">Chat</a>
            <a href="#" class="nav-link saved-link">Saved <span class="badge-count hidden" id="saved-count">0</span></a>
            <a href="tenant-profile.html" class="nav-link">Profile</a>
        </div>
        <div class="nav-auth" id="nav-auth-container">
            <!-- Inject Auth details here -->
        </div>
    </nav>

    <!-- Main Content -->
    <div class="chat-container">
        <!-- Sidebar -->
        <aside class="chat-sidebar">
            <div class="chat-sidebar-header">
                <h2>Messages</h2>
            </div>
            <ul class="contact-list" id="contact-list">
                <!-- Contacts will be injected here -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main" id="chat-main">
            <div class="empty-chat" id="empty-chat-state">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3>Your Messages</h3>
                <p>Select a conversation or start a new one.</p>
            </div>

            <div id="active-chat-content" class="hidden" style="display: none; flex-direction: column; height: 100%;">
                <header class="chat-header">
                    <div style="display: flex; align-items: center; gap: 1rem; flex: 1;">
                        <img src="" alt="Contact Avatar" class="chat-header-avatar" id="active-chat-avatar">
                        <div class="chat-header-info">
                            <span class="chat-header-name" id="active-chat-name">Owner Name</span>
                            <span class="chat-header-status">Online</span>
                        </div>
                    </div>
                    <button id="send-feedback-btn" onclick="openFeedbackModal('general', 'Overall Experience Feedback')" style="padding: 0.5rem 1rem; background-color: var(--primary-color); border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.3rem;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        Send Feedback
                    </button>
                </header>

                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be injected here -->
                </div>

                <form class="chat-input-area" id="chat-form">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Type your message here..."
                        required autocomplete="off">
                    <button type="submit" class="btn-send">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Leave Feedback Modal -->
    <div id="leave-feedback-modal" class="hidden" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--surface-color); padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); position: relative;">
            <button onclick="document.getElementById('leave-feedback-modal').style.display='none'"
                style="position: absolute; top: 1rem; right: 1.5rem; background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h3 id="feedback-prop-title" style="margin-top: 0; margin-bottom: 0.5rem; color: var(--text-light);">Property</h3>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">How was your experience?</p>
            
            <div id="star-rating" style="display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; cursor: pointer;">
                <svg data-rating="1" class="star" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <svg data-rating="2" class="star" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <svg data-rating="3" class="star" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <svg data-rating="4" class="star" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <svg data-rating="5" class="star" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            </div>
            <textarea id="feedback-comments" rows="4" placeholder="Share your experience..." style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; resize: vertical; margin-bottom: 1.5rem;"></textarea>
            
            <button id="submit-feedback-btn" style="width: 100%; padding: 0.8rem; background: var(--primary-color); border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer;">Submit Feedback</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Restore User Avatar
            const navAuthDiv = document.getElementById('nav-auth-container');
            const isLoggedIn = localStorage.getItem('tenantLoggedIn') === 'true';

            if (!isLoggedIn) {
                window.location.href = 'tenant-login.html';
                return;
            }

            let userAvatarStr = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80";
            const profileDataStr = localStorage.getItem('tenantProfile');
            if (profileDataStr) {
                try {
                    const profileData = JSON.parse(profileDataStr);
                    if (profileData.avatar) userAvatarStr = profileData.avatar;
                } catch (e) { }
            }
            navAuthDiv.innerHTML = `
                <a href="tenant-profile.html" aria-label="Tenant Profile">
                    <div class="user-avatar"
                        style="width: 35px; height: 35px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 2px solid var(--primary-color);">
                        <img src="${userAvatarStr}"
                            alt="User" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </a>
            `;

            // Load Chats
            let chats = JSON.parse(localStorage.getItem('tenantChats') || '[]');

            // Generate some mock history if a chat exists
            chats = chats.map(chat => {
                if (!chat.messages) {
                    chat.messages = [
                        { text: "Hi, I'm interested in this property.", sender: "user", time: "10:00 AM" },
                        { text: `Hello! I am ${chat.name}. I'd be happy to arrange a visit. When are you available?`, sender: "owner", time: "10:15 AM" }
                    ];
                }
                return chat;
            });
            localStorage.setItem('tenantChats', JSON.stringify(chats));

            const contactList = document.getElementById('contact-list');
            const activeChatContent = document.getElementById('active-chat-content');
            const emptyChatState = document.getElementById('empty-chat-state');
            const chatMessagesContainer = document.getElementById('chat-messages');

            let currentChatId = null;

            function renderContacts() {
                contactList.innerHTML = '';
                chats.forEach(chat => {
                    const li = document.createElement('li');
                    li.className = `contact-item ${currentChatId === chat.id ? 'active' : ''}`;

                    const lastMsg = chat.messages.length > 0 ? chat.messages[chat.messages.length - 1].text : 'No messages yet';

                    li.innerHTML = `
                        <img src="${chat.avatar}" alt="${chat.name}" class="contact-avatar">
                        <div class="contact-info">
                            <div class="contact-name">${chat.name}</div>
                            <div class="contact-preview">${lastMsg}</div>
                        </div>
                    `;
                    li.addEventListener('click', () => openChat(chat.id));
                    contactList.appendChild(li);
                });
            }

            function openChat(id) {
                currentChatId = id;
                const chat = chats.find(c => c.id === id);
                if (!chat) return;

                emptyChatState.style.display = 'none';
                activeChatContent.style.display = 'flex';
                activeChatContent.classList.remove('hidden');

                document.getElementById('active-chat-name').textContent = chat.name;
                document.getElementById('active-chat-avatar').src = chat.avatar;
                document.getElementById('send-feedback-btn').style.display = 'inline-block';

                renderMessages(chat);
                renderContacts(); // update active state in sidebar

                // Remove unread query param if exists
                try {
                    const url = new URL(window.location);
                    if (url.searchParams.has('owner')) {
                        url.searchParams.delete('owner');
                        window.history.replaceState({}, '', url);
                    }
                } catch(e) {}
            }

            function renderMessages(chat) {
                chatMessagesContainer.innerHTML = '';
                chat.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === 'user' ? 'sent' : 'received'}`;
                    
                    if (msg.type === 'feedback_request') {
                        div.innerHTML = `
                            <div class="message-bubble" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 250px;">
                                <img src="${msg.propertyData.image}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 0.5rem;">
                                <strong style="display:block; margin-bottom: 0.3rem;">Leave Feedback</strong>
                                <span style="font-size: 0.85rem; color: var(--text-muted); display:block; margin-bottom: 0.8rem;">${msg.propertyData.title}</span>
                                <button onclick="openFeedbackModal('${msg.propertyData.id}', '${msg.propertyData.title.replace(/'/g, "\\'")}')" style="width: 100%; padding: 0.5rem; background: var(--primary-color); border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 0.9rem;">Rate Property</button>
                            </div>
                            <div class="message-time">${msg.time}</div>
                        `;
                    } else if (msg.type === 'feedback_response') {
                        let starsHtml = '';
                        for(let i = 1; i <= 5; i++) {
                            starsHtml += `<svg width="14" height="14" viewBox="0 0 24 24" fill="${i <= msg.ratingData.stars ? '#f1c40f' : 'none'}" stroke="${i <= msg.ratingData.stars ? '#f1c40f' : 'currentColor'}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
                        }
                        div.innerHTML = `
                            <div class="message-bubble" style="background: rgba(46, 204, 113, 0.15); border: 1px solid rgba(46, 204, 113, 0.3);">
                                <strong>You left Feedback!</strong><br>
                                <div style="margin: 0.3rem 0;">${starsHtml}</div>
                                <span style="font-size: 0.9rem; font-style: italic;">"${msg.ratingData.comments}"</span>
                            </div>
                            <div class="message-time">${msg.time}</div>
                        `;
                    } else {
                        div.innerHTML = `
                            <div class="message-bubble">${msg.text}</div>
                            <div class="message-time">${msg.time}</div>
                        `;
                    }
                    chatMessagesContainer.appendChild(div);
                });
                chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
            }

            document.getElementById('chat-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('chat-input');
                const text = input.value.trim();

                if (text && currentChatId) {
                    const chatIndex = chats.findIndex(c => c.id === currentChatId);
                    if (chatIndex !== -1) {
                        // User message
                        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        chats[chatIndex].messages.push({ text, sender: "user", time });

                        // Mock auto response removed for true live chat
                        // setTimeout(() => { ... }, 1000);

                        input.value = '';
                        localStorage.setItem('tenantChats', JSON.stringify(chats));
                        renderMessages(chats[chatIndex]);
                        renderContacts();
                    }
                }
            });

            // Check if arriving from a specific owner referral
            const urlParams = new URLSearchParams(window.location.search);
            const targetOwnerId = urlParams.get('owner');

            renderContacts();

            if (targetOwnerId) {
                openChat(targetOwnerId);
            }
            
            // Global Function to open feedback modal
            let currentFeedbackPropId = null;
            let currentFeedbackPropTitle = '';
            let selectedStars = 0;
            
            window.openFeedbackModal = function(propId, propTitle) {
                currentFeedbackPropId = propId;
                currentFeedbackPropTitle = propTitle;
                document.getElementById('feedback-prop-title').textContent = propTitle;
                
                // Reset form
                selectedStars = 0;
                updateStarUI();
                document.getElementById('feedback-comments').value = '';
                
                document.getElementById('leave-feedback-modal').style.display = 'flex';
            };
            
            // Star Interaction
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    selectedStars = parseInt(e.currentTarget.getAttribute('data-rating'));
                    updateStarUI();
                });
            });
            
            function updateStarUI() {
                stars.forEach(star => {
                    const r = parseInt(star.getAttribute('data-rating'));
                    if(r <= selectedStars) {
                        star.setAttribute('fill', '#f1c40f');
                        star.setAttribute('stroke', '#f1c40f');
                    } else {
                        star.setAttribute('fill', 'none');
                        star.setAttribute('stroke', 'currentColor');
                    }
                });
            }
            
            // Submit Feedback
            document.getElementById('submit-feedback-btn').addEventListener('click', () => {
                if(selectedStars === 0) {
                    alert('Please select a star rating.');
                    return;
                }
                const comments = document.getElementById('feedback-comments').value.trim();
                
                if (currentChatId) {
                    const chatIndex = chats.findIndex(c => c.id === currentChatId);
                    if (chatIndex !== -1) {
                        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        chats[chatIndex].messages.push({ 
                            text: `Feedback generated for ${currentFeedbackPropTitle}`, 
                            sender: "user", 
                            time,
                            type: 'feedback_response',
                            ratingData: { stars: selectedStars, comments, propertyTitle: currentFeedbackPropTitle }
                        });

                        localStorage.setItem('tenantChats', JSON.stringify(chats));
                        renderMessages(chats[chatIndex]);
                        renderContacts();
                    }
                }
                document.getElementById('leave-feedback-modal').style.display = 'none';
            });
        });
    </script>
</body>

</html>
